<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bae6fd;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="250" cy="250" r="220" fill="url(#grad1)" opacity="0.3"/>
  
  <!-- Computer Screen -->
  <rect x="150" y="180" width="200" height="140" rx="10" fill="#0891b2"/>
  <rect x="160" y="190" width="180" height="110" fill="#ffffff"/>
  
  <!-- Screen Content Lines -->
  <line x1="170" y1="210" x2="280" y2="210" stroke="#0891b2" stroke-width="4" stroke-linecap="round"/>
  <line x1="170" y1="230" x2="320" y2="230" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>
  <line x1="170" y1="250" x2="300" y2="250" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>
  <line x1="170" y1="270" x2="310" y2="270" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Computer Stand -->
  <rect x="230" y="320" width="40" height="30" fill="#64748b"/>
  <rect x="200" y="350" width="100" height="10" rx="5" fill="#64748b"/>
  
  <!-- Person Head -->
  <circle cx="250" cy="120" r="35" fill="#fbbf24"/>
  
  <!-- Person Body -->
  <ellipse cx="250" cy="190" rx="45" ry="60" fill="#3b82f6"/>
  
  <!-- Arms -->
  <ellipse cx="210" cy="200" rx="15" ry="40" fill="#3b82f6" transform="rotate(-20 210 200)"/>
  <ellipse cx="290" cy="200" rx="15" ry="40" fill="#3b82f6" transform="rotate(20 290 200)"/>
  
  <!-- Hands on keyboard -->
  <circle cx="200" cy="240" r="12" fill="#fbbf24"/>
  <circle cx="300" cy="240" r="12" fill="#fbbf24"/>
  
  <!-- Success Icons -->
  <circle cx="100" cy="150" r="20" fill="#10b981" opacity="0.8"/>
  <text x="100" y="160" text-anchor="middle" fill="white" font-size="24">✓</text>
  
  <circle cx="400" cy="200" r="20" fill="#0891b2" opacity="0.8"/>
  <text x="400" y="210" text-anchor="middle" fill="white" font-size="24">📄</text>
  
  <circle cx="380" cy="100" r="20" fill="#3b82f6" opacity="0.8"/>
  <text x="380" y="110" text-anchor="middle" fill="white" font-size="24">💼</text>
</svg>
